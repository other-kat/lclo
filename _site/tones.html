<!doctype html>
<html class="no-js" lang="">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <title>LCLO</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="apple-touch-icon" href="/apple-touch-icon.png">
        <script src="https://unpkg.com/tone"></script>
    </head>
    <body>
        <script src='/assets/scripts/sound.js' type='module'></script>
        <main id='waveformContainer'></main>
        <div id='notification'><div style='width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center'><div><h1><< Slow Impulse | L.C.L.O.</h1> <br>Click / Tap to begin tones.<br>Drag to change volume & frequency.<br>Protect your hearing, don't use headphones!</div></div></div>
        <div id='mutebuttonstatswrapper'>
            <button id='muteButton'>Mute</button>
            <div id='stats'><div style='width: 25vw; height: 25vh; display: flex; align-items: center; justify-content: center'></div></div>
        </div>
        <canvas id='communalCanvas'></canvas>

        <div id='messages'></div>
    </body>
    <style>
    canvas {
        width: 100vw;
        height: 19vh;
        z-index: 100;
        -webkit-touch-callout: none; /* iOS Safari */
        -webkit-user-select: none; /* Safari */
        -khtml-user-select: none; /* Konqueror HTML */
        -moz-user-select: none; /* Old versions of Firefox */
        -ms-user-select: none; /* Internet Explorer/Edge */
        user-select: none; /* Non-prefixed version, currently */

    }
    #waveformContainer {
        position: relative;
        z-index: 10;
    }
    #communalCanvas {
        width: 100vw !important;
        height: 100vh !important;
        position: absolute;
        top: 0px;
        left: 0px;
        touch-action: none;
        pointer-events: none;
        z-index: 1;
    }
    body {
        font-family: Courier New;
        margin: 0px;
        background-color: rgb(27,27,27);
        color: white;
        overflow: hidden
    }
    #notification {

        top: 0vh;
    }
    #notification, #stats {
        position: absolute;
        z-index: 9999;
        left: 0vw;


    }
    .strikethrough {
        color: #ffffff30;
        text-decoration: line-through;

    }

    #stats {
        display: none;
        width: max-content;
        margin-top: 1vh;
        font-size: 0.7em;
        color: #ffffff90;
    }
    .yellow {

        color: rgb(244,218,104)
    }

    #mutebuttonstatswrapper {
        position: absolute;
        top: 2vw;
        left: 2vw;
        z-index: 9999;
        width: fit-content;
    }
    #muteButton {
        all: unset;
        z-index: 9999;
        display: none;
        padding: 1vw;
        cursor: pointer;
        left: 1vw;
        text-align: center;
        font-size: 10pt;
        background-color: rgba(30,30,30);
        border: 1px solid #ffffff95;
        top: 1vh;
        min-height: 3vh;

    }
    #messages {
        padding: 1em;
        font-size: 0.5em;
        color: #ffffff70;
    }

    #muteButton:active {
        background-color: #7d0b17;
    }
    </style>
</html>
