<!doctype html>
<html class="no-js" lang="">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <title>LCLO</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="apple-touch-icon" href="/apple-touch-icon.png">
        <script src="https://unpkg.com/tone"></script>
    </head>
    <body>
        <script src='/assets/scripts/sound.js' type='module'></script>
        <main id='waveformContainer'></main>
        <div id='notification'><div style='width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center'>Click / Tap to begin tones.<br>Drag to change volume & frequency.<br>Protect your hearing, don't use headphones!</div></div>
        <div id='stats'><div style='width: 25vw; height: 25vh; display: flex; align-items: center; justify-content: center'></div></div>
        <button id='muteButton'>Mute</button>

    </body>
    <style>
    canvas {
        width: 100vw;
        height: 19vh;
    }
    body {
        font-family: Courier New;
        margin: 0px;
        background-color: rgb(27,27,27);
        color: white;
    }
    #notification, #stats {
        position: absolute;
        top: 0vh;
        left: 0vw;


    }

    #stats {
        display: none;
        left: 1vw;
        top: 1vw;
        padding: 1em;
        background-color: rgba(30,30,30)
    }
    .yellow {

        color: rgb(244,218,104)
    }

    #muteButton {
        all: unset;
        position: absolute;
        padding: 1vw;
        cursor: pointer;
        left: 93vw;
        top: 1vw;
        font-size: 1em;
        background-color: rgba(30,30,30)

    }

    #muteButton:active {
        background-color: #7d0b17;
    }
    </style>
